# Nome da Aplicação
spring.application.name=digital-bank

# Configurações do Servidor (Undertow)
server.port=8080


# Ativação das Virtual Threads (Project Loom - Java 21)
# Esta única flag altera todo o motor de execução do Spring Boot.
# Agora, o Undertow e o agendador assíncrono utilizarão threads virtuais leves.
spring.threads.virtual.enabled=true


# Configurações do Banco de Dados (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/bank_db
spring.datasource.username=bank_user
spring.datasource.password=bank_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Configurações de Mensageria (RabbitMQ)
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=bank_mq_user
spring.rabbitmq.password=bank_mq_password

# Configurações do Springdoc OpenAPI (Swagger UI)
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Configurações do Spring Boot Actuator
# Expõe os endpoints via HTTP (habilitando por padrão info, health e metrics)
management.endpoints.web.exposure.include=health,metrics,info
# Mostra detalhes completos do status de saúde (componentes como DB e RabbitMQ)
management.endpoint.health.show-details=always

# Logs para monitorar a concorrência e o scheduler
logging.level.com.bank.digitalbank=DEBUG